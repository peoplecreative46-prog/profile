<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Ahmad Alimuddin</title>
    <!-- Tailwind untuk layout cepat -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Alpine.js untuk interaktivitas -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- AOS untuk animasi scroll -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body x-data="portfolioHandler()" x-init="fetchData()">

    <!-- Hero Section -->
    <section class="hero-section">
        <div class="max-w-4xl mx-auto">
            <!-- Image Placeholder -->
            <img src="profile.jpg" alt="Ahmad Alimuddin" class="w-32 h-32 rounded-full mx-auto mb-6 border-4 border-white shadow-lg object-cover" onerror="this.src='https://via.placeholder.com/150'">
            
            <h1 class="text-5xl font-extrabold mb-4" data-aos="fade-down">
                <span x-text="data.name"></span>
            </h1>
            <p class="text-xl text-slate-500 mb-8" x-text="data.title" data-aos="fade-up"></p>
            
            <!-- Dynamic Stats -->
            <div class="grid grid-cols-3 gap-4 max-w-lg mx-auto">
                <div class="stat-card" data-aos="zoom-in" data-aos-delay="100">
                    <div class="text-3xl font-bold text-blue-600" x-text="data.stats.citations"></div>
                    <div class="text-xs uppercase text-slate-400 font-bold">Sitasi</div>
                </div>
                <div class="stat-card" data-aos="zoom-in" data-aos-delay="200">
                    <div class="text-3xl font-bold text-blue-600" x-text="data.stats.hIndex"></div>
                    <div class="text-xs uppercase text-slate-400 font-bold">H-Index</div>
                </div>
                <div class="stat-card" data-aos="zoom-in" data-aos-delay="300">
                    <div class="text-3xl font-bold text-blue-600" x-text="data.stats.age"></div>
                    <div class="text-xs uppercase text-slate-400 font-bold">Usia</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Bio Section -->
    <section class="py-20 px-6 bg-white">
        <div class="max-w-3xl mx-auto text-center" data-aos="fade-right">
            <h2 class="text-3xl font-bold mb-6">Tentang Saya</h2>
            <p class="text-lg text-slate-600 leading-relaxed" x-text="data.bio"></p>
        </div>
    </section>

    <!-- Publications Section (Interactive Search) -->
    <section class="py-20 px-6 bg-slate-50">
        <div class="max-w-5xl mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
                <h2 class="text-3xl font-bold">Publikasi Ilmiah</h2>
                <input type="text" x-model="search" placeholder="Cari judul penelitian..." class="search-input shadow-sm">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <template x-for="pub in filteredPublications" :key="pub.id">
                    <div class="pub-card" data-aos="fade-up">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full" x-text="pub.year"></span>
                            <span class="text-slate-400 text-xs italic" x-text="pub.citations + ' Sitasi'"></span>
                        </div>
                        <h3 class="font-bold text-slate-800 text-lg mb-2" x-text="pub.title"></h3>
                        <p class="text-sm text-slate-500" x-text="pub.authors"></p>
                    </div>
                </template>
            </div>
        </div>
    </section>

    <footer class="py-10 text-center border-t border-slate-200">
        <p class="text-slate-400 text-sm tracking-widest uppercase">&copy; 2026 Ahmad Alimuddin • IAIN Parepare</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        function portfolioHandler() {
            return {
                data: { stats: {} },
                search: '',
                fetchData() {
                    fetch('data.json')
                        .then(res => res.json())
                        .then(json => {
                            this.data = json;
                            AOS.init({ duration: 1000, once: true });
                        });
                },
                get filteredPublications() {
                    if (!this.data.publications) return [];
                    return this.data.publications.filter(p => 
                        p.title.toLowerCase().includes(this.search.toLowerCase())
                    );
                }
            }
        }
    </script>
</body>
</html>
